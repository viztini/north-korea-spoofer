<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 260px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d0d; color: #e0e0e0; padding: 14px; font-size: 12px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #1e1e1e; padding-bottom: 10px; }
    .title { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.03em; }
    .version { font-size: 10px; color: #444; }
    select { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 5px; color: #e0e0e0; padding: 7px 8px; font-size: 12px; margin-bottom: 10px; cursor: pointer; outline: none; }
    select:focus { border-color: #c8f566; }
    .custom-inputs { display: none; margin-bottom: 10px; gap: 6px; flex-direction: column; }
    .custom-inputs.visible { display: flex; }
    .custom-inputs input { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 5px; color: #e0e0e0; padding: 6px 8px; font-size: 12px; font-family: 'Courier New', monospace; outline: none; width: 100%; }
    .custom-inputs input:focus { border-color: #c8f566; }
    .custom-inputs input::placeholder { color: #444; }
    .coords-box { background: #141414; border: 1px solid #1e1e1e; border-radius: 5px; padding: 8px 10px; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 11px; color: #c8f566; line-height: 1.8; }
    .coords-box .loc-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.07em; }
    .toggle-section { border-top: 1px solid #1e1e1e; padding-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-text { color: #aaa; font-size: 12px; }
    .toggle-sub { color: #555; font-size: 10px; margin-top: 1px; }
    .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #252525; border-radius: 18px; cursor: pointer; transition: background 0.2s; border: 1px solid #2a2a2a; }
    .slider::before { content: ''; position: absolute; width: 12px; height: 12px; left: 2px; top: 2px; background: #444; border-radius: 50%; transition: transform 0.18s, background 0.18s; }
    input:checked + .slider { background: #1a2e10; border-color: #3a5520; }
    input:checked + .slider::before { transform: translateX(16px); background: #c8f566; }
    .footer { margin-top: 10px; font-size: 10px; color: #333; text-align: center; }
    .footer span { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">GeoSpoof</span>
    <span class="version">v2.0</span>
  </div>

  <select id="preset">
    <option value="pyongyang">Pyongyang, DPRK</option>
    <option value="moscow">Moscow, Russia</option>
    <option value="beijing">Beijing, China</option>
    <option value="washington">Washington D.C., USA</option>
    <option value="london">London, UK</option>
    <option value="tokyo">Tokyo, Japan</option>
    <option value="sydney">Sydney, Australia</option>
    <option value="custom">Custom coordinates...</option>
  </select>

  <div class="custom-inputs" id="custom-inputs">
    <input type="number" id="custom-lat" placeholder="Latitude (e.g. 48.8566)" step="0.0001" min="-90" max="90">
    <input type="number" id="custom-lng" placeholder="Longitude (e.g. 2.3522)" step="0.0001" min="-180" max="180">
    <input type="text"   id="custom-tz"  placeholder="Timezone (e.g. Europe/Paris)">
  </div>

  <div class="coords-box">
    <div class="loc-label">active coordinates</div>
    <div id="coords-display">39.0385 N, 125.7543 E</div>
    <div id="tz-display" style="color:#6a9a3a; margin-top:2px;">Asia/Pyongyang</div>
  </div>

  <div class="toggle-section">
    <div class="toggle-row">
      <div><div class="toggle-text">Enable spoofing</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-enabled" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-text">Spoof timezone</div>
        <div class="toggle-sub">Intl.DateTimeFormat + getTimezoneOffset</div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-tz" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-text">Spoof language</div>
        <div class="toggle-sub">navigator.language / languages</div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-lang"><span class="slider"></span></label>
    </div>
  </div>

  <div class="footer"><span>Reload tab after changes to apply</span></div>
  <script src="popup.js"></script>
</body>
</html>
