<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            width: 280px; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: #080808; 
            color: #efefef; 
            padding: 16px; 
            font-size: 13px;
            letter-spacing: -0.01em;
        }

        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 20px; 
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ff3e3e;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3e3e;
        }

        .status-dot.active {
            background: #c8f566;
            box-shadow: 0 0 8px #c8f566;
        }

        .title { 
            font-size: 14px; 
            font-weight: 700; 
            color: #fff; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .location-card {
            background: linear-gradient(145deg, #121212, #1a1a1a);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .location-card::before {
            content: 'DPRK';
            position: absolute;
            right: -10px;
            top: -5px;
            font-size: 40px;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            pointer-events: none;
        }

        .loc-label { 
            font-size: 10px; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 8px;
            font-weight: 600;
        }

        .loc-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .coords { 
            font-family: 'JetBrains Mono', 'Courier New', monospace; 
            font-size: 12px; 
            color: #c8f566; 
        }

        .toggle-section { 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #111;
            padding: 12px;
            border-radius: 8px;
        }

        .toggle-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .toggle-text { font-weight: 500; color: #ccc; }
        .toggle-sub { color: #555; font-size: 10px; margin-top: 2px; }

        .toggle { position: relative; width: 38px; height: 20px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        
        .slider { 
            position: absolute; 
            inset: 0; 
            background: #222; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: .2s; 
            border: 1px solid #333;
        }

        .slider::before { 
            content: ''; 
            position: absolute; 
            width: 14px; 
            height: 14px; 
            left: 2px; 
            top: 2px; 
            background: #666; 
            border-radius: 50%; 
            transition: .2s; 
        }

        input:checked + .slider { background: #1f2d0a; border-color: #3e5e14; }
        input:checked + .slider::before { transform: translateX(18px); background: #c8f566; }

        .footer { 
            margin-top: 20px; 
            font-size: 10px; 
            color: #444; 
            text-align: center; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            <div class="status-dot active" id="status-indicator"></div>
            <span class="title">GeoShield</span>
        </div>
        <span style="font-size: 10px; color: #444;">V2.1</span>
    </div>

    <div class="location-card">
        <div class="loc-label">Active Proxy Location</div>
        <div class="loc-name">Pyongyang, DPRK</div>
        <div class="coords">39.0385° N, 125.7543° E</div>
        <div style="color:#6a9a3a; font-size: 11px; margin-top: 4px;">Asia/Pyongyang (KST)</div>
    </div>

    <div class="toggle-section">
        <div class="toggle-row">
            <div class="toggle-text">Spoofing Active</div>
            <label class="toggle"><input type="checkbox" id="toggle-enabled" checked><span class="slider"></span></label>
        </div>
        
        <div class="toggle-row">
            <div>
                <div class="toggle-text">Match Timezone</div>
                <div class="toggle-sub">Sync system clock to DPRK</div>
            </div>
            <label class="toggle"><input type="checkbox" id="toggle-tz" checked><span class="slider"></span></label>
        </div>

        <div class="toggle-row">
            <div>
                <div class="toggle-text">Match Language</div>
                <div class="toggle-sub">Set locale to Korean (KP)</div>
            </div>
            <label class="toggle"><input type="checkbox" id="toggle-lang" checked><span class="slider"></span></label>
        </div>
    </div>

    <div class="footer">
        Requires tab reload to apply
    </div>

    <script src="popup.js"></script>
    <script>
        // Visual feedback for the status dot
        const toggle = document.getElementById('toggle-enabled');
        const dot = document.getElementById('status-indicator');
        toggle.addEventListener('change', () => {
            dot.className = toggle.checked ? 'status-dot active' : 'status-dot';
        });
    </script>
</body>
</html>
