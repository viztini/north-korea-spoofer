<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }
    .subtitle {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .coords {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .coords-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 6px;
    }
    .coords-val {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #c8f566;
      line-height: 1.7;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label {
      font-size: 12px;
      color: #aaa;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #1e3a1e; }
    input:checked + .slider::before { transform: translateX(16px); background: #c8f566; }
    .status {
      font-size: 10px;
      color: #555;
      margin-top: 12px;
      text-align: center;
    }
    .status span { color: #c8f566; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">GeoSpoof</div>
      <div class="subtitle">NK Edition</div>
    </div>
  </div>

  <div class="coords">
    <div class="coords-label">Spoofed coordinates</div>
    <div class="coords-val">
      39.0392° N<br>
      125.7625° E<br>
      Pyongyang, DPRK
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable spoofing</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Active on all tabs — <span>reload to apply</span></div>

  <script src="popup.js"></script>
</body>
</html>
